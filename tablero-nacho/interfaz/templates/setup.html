<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Tablero Nacho — Configuración</title>
    <link rel="stylesheet" href="/static/css/estilos.css">
</head>
<body class="setup-body">
    <div class="setup-container">
        <h1>♟️ ¡Bienvenido al Tablero!</h1>
        <p class="setup-subtitle">Vamos a configurar tu perfil para empezar a jugar</p>

        <div class="setup-form" id="paso-1">
            <label class="setup-label">¿Cómo te llamás?</label>
            <input type="text" id="nombre" class="setup-input" placeholder="Tu nombre..." autofocus>
            <button class="btn-grande btn-primario" onclick="siguientePaso(2)">Siguiente →</button>
        </div>

        <div class="setup-form oculto" id="paso-2">
            <label class="setup-label">¿Cuántos años tenés?</label>
            <input type="number" id="edad" class="setup-input" placeholder="Tu edad..." min="4" max="99">
            <button class="btn-grande btn-primario" onclick="siguientePaso(3)">Siguiente →</button>
        </div>

        <div class="setup-form oculto" id="paso-3">
            <label class="setup-label">¿Cómo se llama tu profesor de ajedrez?</label>
            <input type="text" id="nombre-profesor" class="setup-input" placeholder="Profe, Maestro, o un nombre...">
            <p class="setup-hint">Podés dejarlo vacío y se va a llamar "El Profe"</p>
            <button class="btn-grande btn-primario" onclick="siguientePaso(4)">Siguiente →</button>
        </div>

        <div class="setup-form oculto" id="paso-4">
            <label class="setup-label">¿Ya sabés jugar al ajedrez?</label>
            <div class="setup-opciones">
                <button class="btn-grande btn-opcion" onclick="elegirNivel('si')">¡Sí, ya juego!</button>
                <button class="btn-grande btn-opcion" onclick="elegirNivel('aprendiendo')">Estoy aprendiendo</button>
                <button class="btn-grande btn-opcion" onclick="elegirNivel('no')">Todavía no</button>
            </div>
        </div>

        <div class="setup-form oculto" id="paso-final">
            <div class="setup-listo">
                <p class="setup-emoji">🎉</p>
                <p class="setup-label" id="mensaje-bienvenida"></p>
                <button class="btn-grande btn-primario" onclick="window.location='/'">¡A jugar!</button>
            </div>
        </div>
    </div>

    <script>
        let datosPerfil = {};

        function siguientePaso(paso) {
            if (paso === 2) {
                const nombre = document.getElementById('nombre').value.trim();
                if (!nombre) { document.getElementById('nombre').focus(); return; }
                datosPerfil.nombre = nombre;
            } else if (paso === 3) {
                const edad = parseInt(document.getElementById('edad').value);
                if (!edad || edad < 4) { document.getElementById('edad').focus(); return; }
                datosPerfil.edad = edad;
            } else if (paso === 4) {
                const prof = document.getElementById('nombre-profesor').value.trim();
                datosPerfil.nombre_profesor = prof || 'El Profe';
            }

            // Ocultar todos los pasos
            document.querySelectorAll('.setup-form').forEach(el => el.classList.add('oculto'));
            document.getElementById('paso-' + paso).classList.remove('oculto');
        }

        async function elegirNivel(nivel) {
            datosPerfil.sabe_jugar = nivel;

            const resp = await fetch('/api/setup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(datosPerfil),
            });

            if (resp.ok) {
                document.querySelectorAll('.setup-form').forEach(el => el.classList.add('oculto'));
                document.getElementById('paso-final').classList.remove('oculto');
                document.getElementById('mensaje-bienvenida').textContent =
                    `¡Listo, ${datosPerfil.nombre}! Tu profesor ${datosPerfil.nombre_profesor} te está esperando.`;
            }
        }
    </script>
</body>
</html>
