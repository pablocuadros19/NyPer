<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Tablero Nacho — Ajedrez</title>
    <link rel="stylesheet" href="/static/css/estilos.css">
</head>
<body>
    <div class="app-container">
        <!-- Panel izquierdo: jugadas anotadas (colapsable) -->
        <div class="panel-jugadas" id="panel-jugadas">
            <div class="jugadas-header">
                <span class="jugadas-titulo">📋 Jugadas</span>
                <button class="btn-toggle-jugadas" onclick="toggleJugadas()" title="Ocultar panel">◀</button>
            </div>
            <div class="jugadas-lista" id="jugadas-lista">
                <p class="jugadas-vacio">Las jugadas van a aparecer acá</p>
            </div>
        </div>
        <button class="btn-mostrar-jugadas oculto" id="btn-mostrar-jugadas" onclick="toggleJugadas()" title="Ver jugadas">📋</button>

        <!-- Panel central: tablero -->
        <div class="panel-tablero">
            <div class="tablero-header">
                <h1 class="titulo-app">♟️ Tablero de {{ jugador.nombre }}</h1>
                <div class="info-partida" id="info-partida">
                    <span id="turno-label" class="turno-label">Sin partida</span>
                    <span id="nivel-label" class="nivel-label"></span>
                    <span id="velocidad-label" class="velocidad-toggle" onclick="toggleVelocidad()">⚡ Normal</span>
                </div>
            </div>

            <div class="tablero-wrapper">
                <div class="tablero" id="tablero">
                    <!-- Se genera con JS -->
                </div>
            </div>

            <div class="botones-accion">
                <button class="btn-grande btn-accion" id="btn-nueva" onclick="mostrarMenuNueva()">
                    🎮 Nueva Partida
                </button>
                <button class="btn-grande btn-accion" id="btn-deshacer" onclick="deshacer()" disabled>
                    ↩️ Deshacer
                </button>
                <button class="btn-grande btn-accion btn-profesor" id="btn-consejo" onclick="pedirConsejo()" disabled>
                    🧠 Preguntarle al Profe
                </button>
                <button class="btn-grande btn-accion btn-rendirse" id="btn-rendirse" onclick="rendirse()" disabled>
                    🏳️ Rendirse
                </button>
            </div>
        </div>

        <!-- Panel derecho: profesor/chat -->
        <div class="panel-profesor">
            <div class="profesor-header">
                <h2 id="nombre-profesor">{{ jugador.nombre_profesor }}</h2>
                <div class="toggle-ensenanza">
                    <label class="switch">
                        <input type="checkbox" id="toggle-modo" checked onchange="toggleEnsenanza()">
                        <span class="slider"></span>
                    </label>
                    <span class="toggle-label">Modo enseñanza</span>
                </div>
            </div>

            <div class="chat-mensajes" id="chat-mensajes">
                <div class="mensaje mensaje-profesor">
                    <p>¡Hola {{ jugador.nombre }}! Tocá "Nueva Partida" para empezar 🎯</p>
                </div>
            </div>

            <div class="chat-input-container">
                <input type="text" id="chat-input" class="chat-input"
                    placeholder="Escribile al profe..." onkeydown="if(event.key==='Enter')enviarChat()">
                <button class="btn-enviar" onclick="enviarChat()">📨</button>
            </div>
        </div>
    </div>

    <!-- Modal bienvenida — aparece siempre al abrir -->
    <div class="modal-overlay" id="modal-bienvenida">
        <div class="modal">
            <h2>♟️ Tablero de Nacho</h2>

            <div class="modal-seccion">
                <label>¿Cómo te llamás?</label>
                <input type="text" id="bienvenida-nombre" class="setup-input"
                    placeholder="Tu nombre..."
                    value="{{ jugador.nombre }}"
                    autocomplete="off">
            </div>

            <div class="modal-seccion">
                <label>Dificultad:</label>
                <div class="modal-opciones">
                    <button class="btn-opcion nivel-seleccionado" data-nivel="1" onclick="seleccionarNivel(1)">🌱 Aprendiz</button>
                    <button class="btn-opcion" data-nivel="2" onclick="seleccionarNivel(2)">🤝 Compañero</button>
                    <button class="btn-opcion" data-nivel="3" onclick="seleccionarNivel(3)">⚔️ Desafío</button>
                </div>
            </div>

            <div class="modal-seccion">
                <label>Tu color:</label>
                <div class="modal-opciones">
                    <button class="btn-opcion color-seleccionado" data-color="blancas" onclick="seleccionarColor('blancas')">⬜ Blancas</button>
                    <button class="btn-opcion" data-color="negras" onclick="seleccionarColor('negras')">⬛ Negras</button>
                </div>
            </div>

            <div class="modal-seccion">
                <label>Velocidad del oponente:</label>
                <div class="modal-opciones">
                    <button class="btn-opcion" data-vel="lenta" onclick="seleccionarVelocidad('lenta')">🐢 Lenta</button>
                    <button class="btn-opcion vel-seleccionado" data-vel="normal" onclick="seleccionarVelocidad('normal')">⚡ Normal</button>
                </div>
            </div>

            <div class="modal-botones">
                <button class="btn-grande btn-primario" onclick="iniciarDesdeModal()">¡Jugar!</button>
            </div>
        </div>
    </div>

    <!-- Modal nueva partida (durante la sesión) -->
    <div class="modal-overlay oculto" id="modal-nueva">
        <div class="modal">
            <h2>Nueva Partida</h2>
            <div class="modal-seccion">
                <label>Dificultad:</label>
                <div class="modal-opciones">
                    <button class="btn-opcion nivel-seleccionado" data-nivel="1" onclick="seleccionarNivel(1)">🌱 Aprendiz</button>
                    <button class="btn-opcion" data-nivel="2" onclick="seleccionarNivel(2)">🤝 Compañero</button>
                    <button class="btn-opcion" data-nivel="3" onclick="seleccionarNivel(3)">⚔️ Desafío</button>
                </div>
            </div>
            <div class="modal-seccion">
                <label>Tu color:</label>
                <div class="modal-opciones">
                    <button class="btn-opcion color-seleccionado" data-color="blancas" onclick="seleccionarColor('blancas')">⬜ Blancas</button>
                    <button class="btn-opcion" data-color="negras" onclick="seleccionarColor('negras')">⬛ Negras</button>
                </div>
            </div>
            <div class="modal-botones">
                <button class="btn-grande btn-primario" onclick="iniciarPartida()">¡Jugar!</button>
                <button class="btn-grande btn-secundario" onclick="cerrarModal()">Cancelar</button>
            </div>
        </div>
    </div>

    <script src="/static/js/tablero.js"></script>
</body>
</html>
